<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYN — Live Tonight. Lead Tomorrow.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200;12..96,400;12..96,600;12..96,800&family=DM+Serif+Display:ital@0;1&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F5F1EB;
      --cream-alt: #EDE9E1;
      --green-deep: #1B4332;
      --green-sage: #5A7A5E;
      --gold: #C9A84C;
      --gold-warm: #D4AF5A;
      --text: #1A1A1A;
      --text-dim: #777;
      --font-display: 'Bricolage Grotesque', system-ui, sans-serif;
      --font-accent: 'DM Serif Display', Georgia, serif;
      --font-body: 'Outfit', system-ui, sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--cream);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ========== HERO SECTION ========== */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 700px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.5rem 3.5rem;
      overflow: hidden;
    }

    /* Subtle grain overlay */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 50;
    }

    /* ========== HEADER ========== */
    .hero-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 30;
    }

    .hero-logo {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.3em;
      color: var(--green-deep);
      text-transform: uppercase;
      opacity: 0;
      transform: translateX(-20px);
      animation: fadeInLeft 0.6s ease-out 0.2s forwards;
    }

    .hero-nav {
      display: flex;
      gap: 2.5rem;
      align-items: center;
    }

    .hero-nav a {
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.3s ease;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
    }

    .hero-nav a:nth-child(1) { animation-delay: 0.3s; }
    .hero-nav a:nth-child(2) { animation-delay: 0.4s; }
    .hero-nav a:nth-child(3) { animation-delay: 0.5s; }
    .hero-nav a:nth-child(4) { animation-delay: 0.6s; }

    .hero-nav a:hover { color: var(--green-deep); }

    /* Mobile hamburger */
    .hero-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0;
      animation: fadeInRight 0.5s ease-out 0.3s forwards;
    }

    .hero-hamburger span {
      display: block;
      height: 1.5px;
      background: var(--text);
      transition: width 0.3s ease;
    }

    .hero-hamburger span:nth-child(1) { width: 24px; }
    .hero-hamburger span:nth-child(2) { width: 24px; }
    .hero-hamburger span:nth-child(3) { width: 18px; }

    /* ========== MAIN CONTENT GRID ========== */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      align-items: center;
      flex: 1;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 20;
    }

    /* Left column — body copy */
    .hero-left {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.7s ease-out 1s forwards;
    }

    .hero-left p {
      font-family: var(--font-body);
      font-size: 0.92rem;
      font-weight: 300;
      line-height: 1.8;
      color: var(--text-dim);
      max-width: 260px;
    }

    .hero-left .read-more {
      display: inline-block;
      margin-top: 1.2rem;
      font-family: var(--font-body);
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--green-deep);
      text-decoration: none;
      position: relative;
    }

    .hero-left .read-more::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--green-deep);
      transform: scaleX(0.4);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .hero-left .read-more:hover::after {
      transform: scaleX(1);
    }

    /* Center column — product image + circle */
    .hero-center {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      height: 100%;
    }

    .hero-circle {
      position: absolute;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--gold-warm), var(--gold));
      opacity: 0;
      transform: scale(0.7);
      animation: circleIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
      z-index: 0;
    }

    .hero-circle::after {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%);
      z-index: -1;
    }

    .hero-product-img {
      position: relative;
      z-index: 10;
      width: 340px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 60px 25px rgba(20, 20, 15, 0.25));
      opacity: 0;
      transform: translateY(40px);
      animation: productIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards,
                 capsuleFloat 4s ease-in-out 1.5s infinite;
    }

    /* Right column — big overlay text */
    .hero-right {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.7s ease-out 1.2s forwards;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 7vw, 7rem);
      font-weight: 800;
      line-height: 0.95;
      color: var(--green-deep);
      letter-spacing: -0.02em;
    }

    .hero-title .line-accent {
      font-family: var(--font-accent);
      font-style: italic;
      font-weight: 400;
      color: var(--gold);
    }

    /* ========== FOOTER ========== */
    .hero-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 30;
    }

    .hero-socials {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      opacity: 0;
      transform: translateY(15px);
      animation: fadeInUp 0.5s ease-out 1.3s forwards;
    }

    .hero-socials a {
      color: var(--text-dim);
      transition: color 0.3s ease;
      display: flex;
      align-items: center;
    }

    .hero-socials a:hover { color: var(--green-deep); }

    .hero-socials svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hero-tagline {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      opacity: 0;
      transform: translateY(15px);
      animation: fadeInUp 0.5s ease-out 1.4s forwards;
    }

    /* ========== ANIMATIONS ========== */
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes fadeInLeft {
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeInRight {
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes circleIn {
      to { opacity: 0.9; transform: scale(1); }
    }

    @keyframes productIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes capsuleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 1024px) {
      .hero-circle {
        width: 300px;
        height: 300px;
      }

      .hero-product-img {
        width: 260px;
      }

      .hero-title {
        font-size: clamp(2.5rem, 5vw, 4.5rem);
      }
    }

    @media (max-width: 768px) {
      .hero {
        padding: 2rem;
        min-height: 100vh;
      }

      .hero-nav { display: none; }
      .hero-hamburger { display: flex; }

      .hero-grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
        text-align: center;
        gap: 2rem;
      }

      .hero-left {
        order: 2;
      }

      .hero-left p {
        max-width: 100%;
        margin: 0 auto;
      }

      .hero-center {
        order: 1;
        min-height: 320px;
      }

      .hero-circle {
        width: 240px;
        height: 240px;
      }

      .hero-product-img {
        width: 220px;
      }

      .hero-right {
        order: 3;
        justify-content: center;
        text-align: center;
      }

      .hero-title {
        font-size: 3.5rem;
      }

      .hero-footer {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <!-- Header -->
    <header class="hero-header">
      <div class="hero-logo">SYN</div>
      <nav class="hero-nav">
        <a href="#product">Product</a>
        <a href="#science">Science</a>
        <a href="#results">Results</a>
        <a href="#compare">Compare</a>
      </nav>
      <button class="hero-hamburger" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <!-- Main Grid -->
    <div class="hero-grid">
      <!-- Left: Body copy -->
      <div class="hero-left">
        <p>Clinical-dose NAC and botanical liver support in a single serving. Designed for professionals who drink for work and can't afford to lose a morning.</p>
        <a href="#product" class="read-more">Explore the formula</a>
      </div>

      <!-- Center: Product image + gold circle -->
      <div class="hero-center">
        <div class="hero-circle"></div>
        <img
          src="images/capsule-floating.png"
          alt="SYN premium supplement capsule floating"
          class="hero-product-img"
        >
      </div>

      <!-- Right: Big title -->
      <div class="hero-right">
        <h1 class="hero-title">
          Live<br>
          Tonight.<br>
          <span class="line-accent">Lead<br>Tomorrow.</span>
        </h1>
      </div>
    </div>

    <!-- Footer -->
    <footer class="hero-footer">
      <div class="hero-socials">
        <!-- Instagram -->
        <a href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
        </a>
        <!-- Twitter/X -->
        <a href="#" aria-label="Twitter">
          <svg viewBox="0 0 24 24"><path d="M4 4l6.5 8L4 20h2l5.5-6.8L16 20h4l-6.8-8.5L19.5 4H18l-5 6.2L9 4H4z"/></svg>
        </a>
        <!-- LinkedIn -->
        <a href="#" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        </a>
      </div>
      <div class="hero-tagline">Formulated for high performers</div>
    </footer>
  </section>

</body>
</html>
